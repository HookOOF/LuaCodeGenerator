services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e 'GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q 'HTTP/1.1 200' <&3"]
      interval: 10s
      timeout: 5s
      retries: 5


  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5


  init:
    build: .
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
      QDRANT_LOCAL_PATH: ""
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      CHAT_STORAGE_DIR: /data/chat_storage
    volumes:
      - chat_data:/data/chat_storage
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    entrypoint: ["python", "-m", "scripts.init"]
    restart: "no"

  backend:
    build: .
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
      QDRANT_LOCAL_PATH: ""
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      CHAT_STORAGE_DIR: /data/chat_storage
    volumes:
      - chat_data:/data/chat_storage
    ports:
      - "18080:8080"
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
      init:
        condition: service_completed_successfully

  frontend:
    build: ./localscript
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  qdrant_data:
  ollama_data:
  chat_data:
